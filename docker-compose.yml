version: '3.8'

services:
  backend:
    build:
      context: ./demo
      dockerfile: Dockerfile
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/demo-db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=demo-user
      - SPRING_DATASOURCE_PASSWORD=demo-password
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./demo-front
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: demo-password
      MYSQL_DATABASE: demo-db
      MYSQL_USER: demo-user
      MYSQL_PASSWORD: demo-password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
